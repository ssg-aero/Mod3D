# ============================================================
# CI — Build & Test (multi-plateforme)
# ============================================================
# Ce workflow s'execute a chaque push sur main ou PR.
# Il compile et teste sur Linux, Windows et macOS en parallele.
#
# La section "strategy.matrix" definit les variantes :
# chaque combinaison genere un job independant.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: CI

jobs:
  build-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / occt${{ matrix.occt-spec || 'default' }}
    strategy:
      fail-fast: false    # ne pas arreter les autres OS si l'un echoue
      # Matrice plate (que des entrees `include`) plutot qu'un produit
      # cartesien : GitHub Actions n'accepte `exclude` que sur des cles
      # declarees au top-level, et lister `os` au top-level forcerait a
      # exclure 8 combos sur 12. Le format explicite ci-dessous tient en
      # 4 entrees, une par job CI :
      # - 3 jobs stables : py3.13 + occt par defaut sur les 3 OS
      # - 1 job canary  : py3.14 + occt>=8 sur Linux uniquement, pour
      #   detecter les regressions d'API OCCT 8.x (Standard_Real
      #   deprecie, transitive includes manquants) sans tripler le
      #   temps CI
      matrix:
        include:
          # --- Linux / py3.13 / occt default : variante de reference ---
          - os: ubuntu-latest
            python-version: "3.13"
            occt-spec: ""
            extra-packages: >-
              clangxx
              clang-tools
              llvm-tools
              lld
            cmake-extra: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            shell: micromamba-shell {0}

          # --- Linux / py3.14 / occt>=8 : canary libs les plus recentes ---
          - os: ubuntu-latest
            python-version: "3.14"
            occt-spec: ">=8"
            extra-packages: >-
              clangxx
              clang-tools
              llvm-tools
              lld
            cmake-extra: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            shell: micromamba-shell {0}

          # --- Windows / py3.13 / occt default ---
          # Le runner a MinGW pre-installe qui entre en conflit avec
          # les libs OCCT. On utilise clang comme en local.
          # On utilise bash (Git Bash) parce que `micromamba shell init`
          # crash sur le runner windows-2025-vs2026 (toute version, tout
          # shell) ; la step "Activate env (Windows)" expose manuellement
          # CONDA_PREFIX et PATH apres le Setup.
          - os: windows-latest
            python-version: "3.13"
            occt-spec: ""
            extra-packages: >-
              clangxx
              clang-tools
              llvm-tools
              lld
            cmake-extra: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            shell: bash

          # --- macOS / py3.13 / occt default ---
          # Compilateur Apple clang (pre-installe via Xcode), pas besoin
          # de forcer.
          - os: macos-latest
            python-version: "3.13"
            occt-spec: ""
            extra-packages: ""
            cmake-extra: ""
            shell: micromamba-shell {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sur Windows on omet `init-shell` car `micromamba shell init`
      # crash sur l'image runner windows-2025-vs2026 (exit 0xC0000005).
      # L'environnement reste expose via les variables (CONDA_PREFIX,
      # PATH) que l'action positionne sans avoir besoin d'init.
      - name: Setup micromamba environment (Windows)
        if: runner.os == 'Windows'
        uses: mamba-org/setup-micromamba@v2
        with:
          # Version pinnee (au lieu de `latest`) pour forcer le download :
          # la micromamba pre-installee sur l'image runner
          # windows-2025-vs2026 crash sur toutes les sous-commandes
          # (exit 0xC0000005). Toute version != pre-installee declenche
          # un download d'une binaire saine.
          micromamba-version: '1.5.10-0'
          environment-name: ci
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=${{ matrix.python-version }}
            cmake
            ninja
            pybind11
            occt${{ matrix.occt-spec }}
            eigen
            numpy
            pythreejs
            pybind11-stubgen
            pytest
            ${{ matrix.extra-packages }}
          cache-environment: true
          # Par defaut l'action lance `micromamba shell init` meme si
          # `init-shell` n'est pas specifie. Sur Windows ce crash
          # (0xC0000005), donc on le desactive explicitement.
          init-shell: none

      # `init-shell: none` n'expose pas CONDA_PREFIX/PATH, donc CMake
      # tomberait sur le Python du host (3.14) au lieu de celui de l'env
      # et ne trouverait pas OpenCASCADE. On fait l'activation a la main
      # via $GITHUB_ENV/$GITHUB_PATH pour les steps suivantes.
      - name: Activate micromamba env (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          env_path="$MAMBA_ROOT_PREFIX/envs/ci"
          echo "CONDA_PREFIX=$env_path" >> "$GITHUB_ENV"
          echo "$env_path/Library/bin" >> "$GITHUB_PATH"
          echo "$env_path/Library/usr/bin" >> "$GITHUB_PATH"
          echo "$env_path/Library/mingw-w64/bin" >> "$GITHUB_PATH"
          echo "$env_path/Scripts" >> "$GITHUB_PATH"
          echo "$env_path" >> "$GITHUB_PATH"

      - name: Setup micromamba environment (Unix)
        if: runner.os != 'Windows'
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: latest
          environment-name: ci
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=${{ matrix.python-version }}
            cmake
            ninja
            pybind11
            occt${{ matrix.occt-spec }}
            eigen
            numpy
            pythreejs
            pybind11-stubgen
            pytest
            ${{ matrix.extra-packages }}
          cache-environment: true
          init-shell: bash

      # Sur Windows conda, les libs sont dans CONDA_PREFIX/Library
      # (pas directement dans CONDA_PREFIX comme sur Unix).
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >-
          cmake -B build -S . -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOD3D_USE_GBS=OFF
          "-DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX/Library"
          ${{ matrix.cmake-extra }}

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: >-
          cmake -B build -S . -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOD3D_USE_GBS=OFF
          -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX
          ${{ matrix.cmake-extra }}

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      # Sur Windows, les DLLs OCCT sont dans CONDA_PREFIX/Library/bin
      # et doivent etre dans le PATH pour que mod3d.pyd les trouve.
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: |
          export PATH="$CONDA_PREFIX/Library/bin:$PATH"
          pytest tests/ -v

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: pytest tests/ -v
