# ============================================================
# CI — Build & Test (multi-plateforme)
# ============================================================
# Ce workflow s'execute a chaque push sur main ou PR.
# Il compile et teste sur Linux, Windows et macOS en parallele.
#
# La section "strategy.matrix" definit les variantes :
# chaque combinaison genere un job independant.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: CI

jobs:
  build-and-test:
    strategy:
      fail-fast: false    # ne pas arreter les autres OS si l'un echoue
      matrix:
        include:
          # --- Linux : compilateur clang depuis conda ---
          - os: ubuntu-latest
            extra-packages: >-
              clangxx
              clang-tools
              llvm-tools
              lld
            cmake-extra: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            shell: micromamba-shell {0}

          # --- Windows : compilateur clang depuis conda ---
          # Le runner a MinGW pre-installe qui entre en conflit avec
          # les libs OCCT. On utilise clang comme en local.
          - os: windows-latest
            extra-packages: >-
              clangxx
              clang-tools
              llvm-tools
              lld
            cmake-extra: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            shell: cmd /C call {0}

          # --- macOS : compilateur Apple clang (pre-installe via Xcode) ---
          # Pas besoin de forcer le compilateur, CMake trouve Apple clang.
          - os: macos-latest
            extra-packages: ""
            cmake-extra: ""
            shell: micromamba-shell {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: latest
          environment-name: ci
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=3.13
            cmake
            ninja
            pybind11
            occt
            eigen
            numpy
            pythreejs
            pybind11-stubgen
            pytest
            ${{ matrix.extra-packages }}
          cache-environment: true
          # Sur Windows, init cmd en plus de bash
          init-shell: >-
            bash
            ${{ matrix.os == 'windows-latest' && 'cmd.exe' || '' }}

      - name: Configure
        run: >-
          cmake -B build -S . -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOD3D_USE_GBS=OFF
          -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX
          ${{ matrix.cmake-extra }}

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Test
        run: pytest tests/ -v
