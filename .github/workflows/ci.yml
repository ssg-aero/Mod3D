# ============================================================
# CI — Build & Test (multi-plateforme)
# ============================================================
# Ce workflow s'execute a chaque push sur main ou PR.
# Il compile et teste sur Linux ET Windows en parallele.
#
# La section "strategy.matrix" definit les variantes :
# chaque combinaison {os, packages, cmake_args} genere un job
# independant qui tourne en parallele sur un runner different.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: CI

jobs:
  build-and-test:
    # "matrix" = on lance le MEME job plusieurs fois avec des
    # parametres differents. Ici : une fois Linux, une fois Windows.
    strategy:
      fail-fast: false    # ne pas arreter l'autre OS si l'un echoue
      matrix:
        include:
          # --- Linux : compilateur clang ---
          - os: ubuntu-latest
            packages: >-
              clangxx
              clang-tools
              llvm-tools
              lld
            cmake-extra: ""
            prefix-var: CONDA_PREFIX

          # --- Windows : compilateur MSVC (fourni par le runner) ---
          # Pas besoin d'installer clang, le runner GitHub Windows
          # a deja Visual Studio installe.
          - os: windows-latest
            packages: ""
            cmake-extra: ""
            prefix-var: CONDA_PREFIX

          # --- macOS : compilateur clang (pre-installe par Apple) ---
          # Le runner macOS a Xcode/clang, pas besoin d'installer
          # de compilateur depuis conda.
          - os: macos-latest
            packages: ""
            cmake-extra: ""
            prefix-var: CONDA_PREFIX

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: latest
          environment-name: ci
          condarc: |
            channels:
              - conda-forge
          # Les packages de base sont communs aux deux OS.
          # matrix.packages ajoute les packages specifiques a l'OS
          # (clang sur Linux, rien sur Windows car MSVC est pre-installe).
          create-args: >-
            python=3.13
            cmake
            ninja
            pybind11
            occt
            eigen
            numpy
            pythreejs
            pybind11-stubgen
            pytest
            ${{ matrix.packages }}
          cache-environment: true

      - name: Configure
        shell: micromamba-shell {0}
        run: >-
          cmake -B build -S . -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOD3D_USE_GBS=OFF
          -DCMAKE_INSTALL_PREFIX=${{ env[matrix.prefix-var] }}
          ${{ matrix.cmake-extra }}

      - name: Build
        shell: micromamba-shell {0}
        run: cmake --build build --parallel

      - name: Install
        shell: micromamba-shell {0}
        run: cmake --install build

      - name: Test
        shell: micromamba-shell {0}
        run: pytest tests/ -v
